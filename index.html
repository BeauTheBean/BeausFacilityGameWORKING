<script>
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");

    function showError(msg) {
        console.error(msg);
        alert(msg);
    }

    const buildUrl = "https://cdn.jsdelivr.net/gh/BeauTheBean/BeausFacilityGameWORKING@latest/Build";

    const config = {
        dataUrl: buildUrl + "/BeausFacilityGame.data.br",
        frameworkUrl: buildUrl + "/BeausFacilityGame.framework.js.br",
        codeUrl: buildUrl + "/BeausFacilityGame.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "BeauTheBean",
        productName: "BeausFacilityGame",
        productVersion: "1.0",

        // 🔥 THIS FIXES MOST BLACK SCREENS WITH .br FILES
        decompressors: {
            brotli: true
        }
    };

    const loaderUrl = buildUrl + "/BeausFacilityGame.loader.js";

    loadingBar.style.display = "block";

    const script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
            loadingBar.style.display = "none";
        }).catch((message) => {
            showError(message);
        });
    };

    script.onerror = () => {
        showError("Failed to load Unity loader.js");
    };

    document.body.appendChild(script);
</script>
